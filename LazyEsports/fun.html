<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>趣味单专区 - 慵懒电竞</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pink: { light: '#FFF0F3', DEFAULT: '#FF6B81', dark: '#E84A5F', soft: '#FF8E9E' },
                        purple: { light: '#F3E8FF', DEFAULT: '#A855F7', dark: '#7C3AED' },
                        pixel: '#2D3436',
                    },
                    fontFamily: { cartoon: ['"Noto Sans SC"', 'sans-serif'] },
                    animation: {
                        'pop-in': 'popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                    },
                    keyframes: {
                        popIn: {
                            '0%': { opacity: '0', transform: 'scale(0.8) translateY(20px)' },
                            '100%': { opacity: '1', transform: 'scale(1) translateY(0)' },
                        }
                    }
                }
            },
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .pixel-text { text-shadow: 2px 2px 0 #2D3436; }
            .neo-brutalism {
                border: 4px solid #2D3436;
                box-shadow: 6px 6px 0px #2D3436;
                transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .neo-brutalism:hover {
                transform: translate(-2px, -4px);
                box-shadow: 10px 10px 0px #FF6B81;
            }
            .neo-brutalism-purple:hover {
                box-shadow: 10px 10px 0px #A855F7;
            }
            .modal-glass {
                background: rgba(45, 52, 54, 0.9);
                backdrop-filter: blur(10px);
            }
        }
        body {
            background-image: radial-gradient(#FF6B81 0.5px, transparent 0.5px), radial-gradient(#FF6B81 0.5px, #FFF8F9 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            background-color: #FFF8F9;
        }
        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-pixel font-cartoon antialiased min-h-screen pb-20">

    <!-- 左上角返回首页按钮 -->
    <a href="index.html" class="fixed top-6 left-6 z-40 bg-white border-2 border-pixel shadow-[4px_4px_0px_#2D3436] rounded-full px-4 py-2 font-bold hover:-translate-y-1 transition-transform flex items-center gap-2">
        <i class="fas fa-arrow-left text-pink"></i> 返回
    </a>

    <!-- 顶部标题 -->
    <header class="pt-20 pb-12 text-center px-4">
        <div class="inline-block relative">
            <div class="absolute -top-6 -right-8 text-3xl rotate-12 animate-bounce"><i class="fas fa-star text-yellow-400 pixel-text"></i></div>
            <h1 class="text-4xl md:text-6xl font-black pixel-text text-white tracking-wider mb-4">
                <span class="text-pink">特色</span>趣味单
            </h1>
            <p class="text-gray-600 font-bold bg-white/80 px-6 py-2 rounded-full border-2 border-pixel inline-block shadow-sm">
                点击卡片，直接查看完整玩法 ✨
            </p>
        </div>
    </header>

    <!-- 卡片网格区 -->
    <main class="max-w-6xl mx-auto px-4">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6" id="cardGrid">
            <!-- 卡片由JS动态生成 -->
        </div>
    </main>

    <!-- 弹窗 (Modal) -->
    <div id="imageModal" class="fixed inset-0 z-50 hidden modal-glass opacity-0 transition-opacity duration-300 flex items-center justify-center p-4">
        
        <div class="relative w-full max-w-3xl flex flex-col items-center">
            <!-- 关闭按钮 -->
            <button onclick="closeModal()" class="absolute -top-12 right-0 md:-right-12 w-10 h-10 bg-white border-4 border-pixel shadow-[4px_4px_0px_#2D3436] rounded-full flex items-center justify-center hover:bg-pink hover:text-white transition-colors z-[60]">
                <i class="fas fa-times text-xl font-black"></i>
            </button>

            <!-- 内容容器：默认支持大图滚动 -->
            <div id="modalContent" class="bg-white p-2 rounded-2xl border-4 border-pixel shadow-[12px_12px_0px_#000] w-full max-h-[80vh] overflow-y-auto no-scrollbar transform scale-95 transition-all duration-300 relative">
                
                <!-- 标题贴纸 (悬浮固定) -->
                <div class="sticky top-2 left-2 z-10 inline-block bg-pink text-white px-4 py-1 rounded-full font-bold border-2 border-pixel shadow-sm mb-2" id="modalTitle">
                    标题
                </div>

                <!-- 图片主体：宽度100%，高度自动（即原尺寸宽度显示） -->
                <img id="modalImage" src="" alt="详情图片" class="w-full h-auto block rounded-xl bg-pink-light">
            </div>
            
            <p class="text-white mt-6 bg-pixel/80 backdrop-blur-sm px-6 py-2 rounded-full text-sm font-bold animate-pulse">
                上下滑动查看完整内容 · 点击空白处关闭
            </p>
        </div>
    </div>

    <!-- 数据与交互逻辑 -->
    <script>
        const funData = [
            { id: 1, title: '关于鼠鼠', icon: 'fa-mouse', color: 'pink', hot: true, imgUrl: 'img/mouse.jpg' },
            { id: 2, title: '护航的一天', icon: 'fa-shield-halved', color: 'purple', hot: false, imgUrl: 'img/huhang.jpg' },
            { id: 3, title: '指定红单', icon: 'fa-gem', color: 'pink', hot: true, imgUrl: 'img/red.jpg' },
            { id: 4, title: '悬赏令', icon: 'fa-scroll', color: 'purple', hot: false, imgUrl: 'img/bounty.jpg' },
            { id: 5, title: '小小巨人', icon: 'fa-child-reaching', color: 'pink', hot: false, imgUrl: 'img/giant.jpg' },
            { id: 6, title: '海龟汤', icon: 'fa-bowl-food', color: 'purple', hot: true, imgUrl: 'img/soup.jpg' },
            { id: 7, title: '旮旯game', icon: 'fa-gamepad', color: 'pink', hot: false, imgUrl: 'img/game.jpg' },
            { id: 8, title: '监狱专属', icon: 'fa-building-lock', color: 'purple', hot: true, imgUrl: 'img/prison.jpg' },
            { id: 9, title: '巴克什专属', icon: 'fa-map-location-dot', color: 'pink', hot: false, imgUrl: 'img/map.jpg' },
            { id: 10, title: '航天专属', icon: 'fa-rocket', color: 'purple', hot: true, imgUrl: 'img/space.jpg' },
            { id: 11, title: '猛攻趣味单', icon: 'fa-fire-flame-curved', color: 'pink', hot: false, imgUrl: 'img/fire.jpg' },
            { id: 12, title: '对赌单', icon: 'fa-dice', color: 'purple', hot: true, imgUrl: 'img/dice.jpg' },
        ];

        const cardGrid = document.getElementById('cardGrid');
        const modal = document.getElementById('imageModal');
        const modalImage = document.getElementById('modalImage');
        const modalTitle = document.getElementById('modalTitle');
        const modalContent = document.getElementById('modalContent');

        // 生成卡片
        funData.forEach(item => {
            const hoverClass = item.color === 'purple' ? 'neo-brutalism-purple' : '';
            const iconColor = item.color === 'purple' ? 'text-purple' : 'text-pink';
            const hotBadge = item.hot ? `<div class="absolute -top-3 -right-3 bg-yellow-400 text-pixel text-xs font-black px-2 py-1 border-2 border-pixel shadow-sm rotate-12 z-10">HOT</div>` : '';

            const cardHTML = `
                <button onclick="openModal('${item.title}', '${item.imgUrl}')" class="relative bg-white rounded-3xl p-6 flex flex-col items-center justify-center gap-4 neo-brutalism ${hoverClass} group">
                    ${hotBadge}
                    <div class="w-16 h-16 rounded-2xl bg-${item.color}-light border-2 border-pixel flex items-center justify-center group-hover:scale-110 group-hover:rotate-6 transition-transform">
                        <i class="fas ${item.icon} text-3xl ${iconColor}"></i>
                    </div>
                    <span class="font-bold text-lg text-pixel">${item.title}</span>
                </button>
            `;
            cardGrid.insertAdjacentHTML('beforeend', cardHTML);
        });

        // 打开弹窗
        function openModal(title, imgSrc) {
            modalTitle.innerText = title;
            modalImage.src = imgSrc;
            
            // 每次打开时，滚动条回到顶部
            modalContent.scrollTop = 0;

            modalImage.onerror = function() {
                this.src = 'data:image/svg+xml;charset=UTF-8,%3Csvg width="400" height="400" xmlns="http://www.w3.org/2000/svg"%3E%3Crect width="400" height="400" fill="%23FFE4E8" /%3E%3Ctext x="50%25" y="50%25" dominant-baseline="middle" text-anchor="middle" font-size="20" fill="%23FF6B81" font-family="sans-serif"%3E图片准备中...%3C/text%3E%3C/svg%3E';
            };
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        // 关闭弹窗
        function closeModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modalImage.src = ''; 
            }, 300);
        }

        // 点击背景关闭
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                closeModal();
            }
        });
        
        // ESC键关闭
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && !modal.classList.contains('hidden')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
