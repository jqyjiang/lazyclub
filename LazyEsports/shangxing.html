<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上新玩法详情 - 慵懒电竞</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pink: { light: '#FFF0F3', DEFAULT: '#FF6B81', dark: '#E84A5F', soft: '#FF8E9E' },
                        purple: { light: '#F3E8FF', DEFAULT: '#A855F7', dark: '#7C3AED' },
                        pixel: '#2D3436',
                    },
                    fontFamily: { cartoon: ['"Noto Sans SC"', 'sans-serif'] },
                    animation: {
                        'float': 'float 4s ease-in-out infinite',
                        'pop-in': 'popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-15px)' },
                        },
                        popIn: {
                            '0%': { opacity: '0', transform: 'scale(0.9)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        }
                    }
                }
            },
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .pixel-text { text-shadow: 2px 2px 0 #2D3436; }
            .neo-brutalism {
                border: 4px solid #2D3436;
                box-shadow: 8px 8px 0px #2D3436;
            }
            .no-scrollbar::-webkit-scrollbar { display: none; }
        }
        body {
            background-image: radial-gradient(#FF6B81 0.5px, transparent 0.5px), radial-gradient(#FF6B81 0.5px, #FFF8F9 0.5px);
            background-size: 20px 20px;
            background-color: #FFF8F9;
        }
    </style>
</head>
<body class="text-pixel font-cartoon antialiased pb-20">

    <!-- 顶部进度条 -->
    <div class="fixed top-0 left-0 w-full h-1.5 z-[60] bg-pink/20">
        <div id="scrollBar" class="h-full bg-pink w-0 transition-all duration-150"></div>
    </div>

    <!-- 左上角返回 -->
    <a href="index.html" class="fixed top-6 left-6 z-50 bg-white border-2 border-pixel shadow-[4px_4px_0px_#2D3436] rounded-full px-4 py-2 font-bold hover:-translate-y-1 transition-transform flex items-center gap-2">
        <i class="fas fa-arrow-left text-pink"></i> 返回
    </a>

    <!-- 标题区 -->
    <header class="pt-20 pb-10 text-center px-4 animate-pop-in">
        <div class="inline-block relative">
            <h1 class="text-4xl md:text-5xl font-black pixel-text text-white tracking-widest mb-4">
                赛季<span class="text-pink">上新</span>玩法
            </h1>
            <div class="flex flex-wrap justify-center gap-3">
                <a href="#constellation" class="bg-white px-4 py-1 rounded-full border-2 border-pixel text-xs font-bold hover:bg-pink-light"># 十二星座</a>
                <a href="#treasure" class="bg-white px-4 py-1 rounded-full border-2 border-pixel text-xs font-bold hover:bg-pink-light"># 藏宝图</a>
                <a href="#escort" class="bg-white px-4 py-1 rounded-full border-2 border-pixel text-xs font-bold hover:bg-pink-light"># 陪跑服务</a>
            </div>
        </div>
    </header>

    <!-- 内容展示区 -->
    <main class="max-w-4xl mx-auto px-4 space-y-16">
        
        <!-- 1. 十二星座 -->
        <section id="constellation" class="animate-pop-in" style="animation-delay: 0.1s;">
            <div class="bg-white rounded-[2.5rem] overflow-hidden neo-brutalism">
                <div class="bg-pink p-4 flex justify-between items-center border-b-4 border-pixel">
                    <span class="text-white font-black italic tracking-widest">01 / TWELVE CONSTELLATIONS</span>
                    <div class="flex gap-1.5">
                        <div class="w-3 h-3 rounded-full bg-white border-2 border-pixel"></div>
                        <div class="w-3 h-3 rounded-full bg-white border-2 border-pixel"></div>
                    </div>
                </div>
                <div class="p-2 bg-pink-light">
                    <img src="img/constellation.png" alt="十二星座" class="w-full h-auto rounded-2xl cursor-zoom-in" onclick="viewImage(this.src, '十二星座玩法')">
                </div>
                <div class="p-4 text-center bg-white border-t-4 border-pixel">
                    <p class="font-bold text-gray-500 text-sm italic">点击图片可放大查看任务细节 👆</p>
                </div>
            </div>
        </section>

        <!-- 2. 藏宝图 -->
        <section id="treasure" class="animate-pop-in" style="animation-delay: 0.2s;">
            <div class="bg-white rounded-[2.5rem] overflow-hidden neo-brutalism">
                <div class="bg-purple p-4 flex justify-between items-center border-b-4 border-pixel">
                    <span class="text-white font-black italic tracking-widest">02 / TREASURE MAP</span>
                    <i class="fas fa-map-marked-alt text-white"></i>
                </div>
                <div class="p-2 bg-purple-light">
                    <img src="img/treasure.jpg" alt="藏宝图" class="w-full h-auto rounded-2xl cursor-zoom-in" onclick="viewImage(this.src, '藏宝图玩法')">
                </div>
                <div class="p-4 text-center bg-white border-t-4 border-pixel">
                    <p class="font-bold text-gray-500 text-sm italic">财富与风险并存，点击查看大图 👆</p>
                </div>
            </div>
        </section>
        <!-- 3. 藏宝图 -->
        <section id="treasure" class="animate-pop-in" style="animation-delay: 0.2s;">
            <div class="bg-white rounded-[2.5rem] overflow-hidden neo-brutalism">
                <div class="bg-purple p-4 flex justify-between items-center border-b-4 border-pixel">
                    <span class="text-white font-black italic tracking-widest">03 / 3x3</span>
                    <i class="fas fa-map-marked-alt text-white"></i>
                </div>
                <div class="p-2 bg-purple-light">
                    <img src="img/3x3.jpg" alt="3x3" class="w-full h-auto rounded-2xl cursor-zoom-in" onclick="viewImage(this.src, '安全箱玩法')">
                </div>
                <div class="p-4 text-center bg-white border-t-4 border-pixel">
                    <p class="font-bold text-gray-500 text-sm italic">新赛季代跑3x3</p>
                </div>
            </div>
        </section>
        <!-- 3. 陪跑服务 -->
        <section id="escort" class="grid grid-cols-1 md:grid-cols-2 gap-8 animate-pop-in" style="animation-delay: 0.3s;">
            <!-- 3x3 -->
            <div class="bg-white rounded-[2rem] overflow-hidden neo-brutalism">
                <div class="bg-pixel p-3 text-white text-center text-xs font-bold">3x3 陪跑详情</div>
                <img src="img/escort_3x3.png" class="w-full h-auto cursor-zoom-in" onclick="viewImage(this.src, '3x3 陪跑服务')">
            </div>
            <!-- 娱乐 -->
            <div class="bg-white rounded-[2rem] overflow-hidden neo-brutalism">
                <div class="bg-pixel p-3 text-white text-center text-xs font-bold">娱乐陪跑详情</div>
                <img src="img/escort_fun.png" class="w-full h-auto cursor-zoom-in" onclick="viewImage(this.src, '娱乐陪跑服务')">
            </div>
        </section>

        <!-- 引导下单 -->
        <div class="text-center py-10">
            <a href="index.html#order" class="inline-block bg-white text-pixel px-10 py-4 rounded-3xl font-black border-4 border-pixel shadow-[6px_6px_0px_#FF6B81] hover:-translate-y-2 transition-all text-xl">
                立即联系客服下单 <i class="fas fa-paper-plane ml-2"></i>
            </a>
        </div>
    </main>

    <!-- 装饰漂浮元素 -->
    <div class="fixed top-1/4 -left-10 text-pink opacity-20 text-6xl animate-float -z-10"><i class="fas fa-moon"></i></div>
    <div class="fixed bottom-1/4 -right-10 text-purple opacity-20 text-6xl animate-float -z-10" style="animation-delay: 1s;"><i class="fas fa-star"></i></div>

    <!-- 大图查看模态框 -->
    <div id="imageModal" class="fixed inset-0 z-[100] hidden bg-pixel/95 flex items-center justify-center p-4 backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="relative w-full max-w-4xl h-full flex flex-col items-center">
            <button onclick="closeModal()" class="absolute -top-2 right-0 bg-white text-pixel w-10 h-10 rounded-full border-4 border-pixel shadow-[4px_4px_0px_#000] z-10">
                <i class="fas fa-times"></i>
            </button>
            <div class="bg-white p-2 rounded-2xl border-4 border-pixel shadow-[10px_10px_0px_#FF6B81] overflow-y-auto no-scrollbar max-h-[85vh] mt-10">
                <div class="sticky top-0 bg-white pb-2 mb-2 border-b-2 border-pixel font-black text-center" id="modalTitle">标题</div>
                <img id="modalImg" src="" class="w-full h-auto rounded-lg">
            </div>
            <p class="text-white mt-4 font-bold animate-pulse">上下滑动查看全图 · 点击背景关闭</p>
        </div>
    </div>

    <script>
        // 进度条逻辑
        window.onscroll = function() {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (winScroll / height) * 100;
            document.getElementById("scrollBar").style.width = scrolled + "%";
        };

        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImg');
        const modalTitle = document.getElementById('modalTitle');

        function viewImage(src, title) {
            modalImg.src = src;
            modalTitle.innerText = title;
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.add('opacity-100'), 10);
        }

        function closeModal() {
            modal.classList.remove('opacity-100');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        modal.onclick = (e) => { if(e.target === modal) closeModal(); }
    </script>
</body>
</html>
