<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陪陪/护航详情 - 慵懒电竞</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pink: { light: '#FFF0F3', DEFAULT: '#FF6B81', dark: '#E84A5F', soft: '#FF8E9E' },
                        purple: { light: '#F3E8FF', DEFAULT: '#A855F7', dark: '#7C3AED' },
                        pixel: '#2D3436',
                    },
                    fontFamily: { cartoon: ['"Noto Sans SC"', 'sans-serif'] },
                    animation: {
                        'float-slow': 'float 5s ease-in-out infinite',
                        'float-fast': 'float 3s ease-in-out infinite',
                        'pop-in': 'popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px) rotate(0deg)' },
                            '50%': { transform: 'translateY(-20px) rotate(5deg)' },
                        },
                        popIn: {
                            '0%': { opacity: '0', transform: 'scale(0.9) translateY(30px)' },
                            '100%': { opacity: '1', transform: 'scale(1) translateY(0)' },
                        }
                    }
                }
            },
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .pixel-text { text-shadow: 2px 2px 0 #2D3436; }
            .neo-brutalism {
                border: 4px solid #2D3436;
                box-shadow: 8px 8px 0px #2D3436;
            }
            /* 模拟手机/游戏窗口的滚动条 */
            .custom-scrollbar::-webkit-scrollbar { width: 6px; }
            .custom-scrollbar::-webkit-scrollbar-track { background: #FFF0F3; }
            .custom-scrollbar::-webkit-scrollbar-thumb { 
                background: #FF6B81; 
                border-radius: 10px;
                border: 2px solid #FFF0F3;
            }
        }
        body {
            background-image: radial-gradient(#FF6B81 0.5px, transparent 0.5px), radial-gradient(#FF6B81 0.5px, #FFF8F9 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            background-color: #FFF8F9;
        }
    </style>
</head>
<body class="text-pixel font-cartoon antialiased min-h-screen pb-20 overflow-x-hidden">

    <!-- 左上角返回按钮 -->
    <a href="index.html" class="fixed top-6 left-6 z-50 bg-white border-2 border-pixel shadow-[4px_4px_0px_#2D3436] rounded-full px-4 py-2 font-bold hover:-translate-y-1 transition-transform flex items-center gap-2">
        <i class="fas fa-arrow-left text-pink"></i> 返回
    </a>

    <!-- 顶部标题区 -->
    <header class="pt-16 pb-8 text-center px-4 animate-pop-in">
        <div class="inline-block relative">
            <h1 class="text-4xl md:text-5xl font-black pixel-text text-white tracking-widest mb-2">
                服务<span class="text-pink">详情</span>
            </h1>
            <div class="bg-white/80 px-4 py-1 rounded-full border-2 border-pixel inline-block text-sm font-bold text-gray-500 shadow-sm">
                Delta Force · 专业护航陪陪 ✨
            </div>
        </div>
    </header>

    <!-- 主容器：长图展示区 -->
    <main class="max-w-3xl mx-auto px-4 relative z-10 animate-pop-in" style="animation-delay: 0.2s;">
        
        <!-- 模拟窗口框架 -->
        <div class="bg-white rounded-[2.5rem] overflow-hidden neo-brutalism relative">
            
            <!-- 窗口顶栏（装饰） -->
            <div class="bg-pixel p-4 flex justify-between items-center">
                <div class="flex gap-2">
                    <div class="w-3 h-3 rounded-full bg-pink"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-400"></div>
                    <div class="w-3 h-3 rounded-full bg-green-400"></div>
                </div>
                <div class="text-[10px] text-white/50 font-mono tracking-widest">LOADING SERVICE_INFO...</div>
            </div>

            <!-- 图片容器 -->
            <div class="w-full bg-pink-light min-h-[400px]">
                <!-- 这里替换成你的长图地址 -->
                <img src="img/jiage.jpg" alt="详情介绍" class="w-full h-auto block" 
                     onerror="this.src='data:image/svg+xml;charset=UTF-8,%3Csvg width=\'800\' height=\'2000\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Crect width=\'800\' height=\'2000\' fill=\'%23FFE4E8\' /%3E%3Ctext x=\'50%25\' y=\'50%25\' dominant-baseline=\'middle\' text-anchor=\'middle\' font-size=\'30\' fill=\'%23FF6B81\' font-family=\'sans-serif\'%3E这里放置你的陪陪详情长图%3C/text%3E%3C/svg%3E';">
            </div>

            <!-- 窗口底栏（引导） -->
            <div class="bg-white p-6 border-t-4 border-pixel text-center">
                <p class="text-gray-400 text-sm mb-4">—— 已加载全部内容 ——</p>
                <a href="index.html#order" class="inline-block bg-pink text-white px-8 py-3 rounded-2xl font-black border-4 border-pixel shadow-[4px_4px_0px_#2D3436] hover:-translate-y-1 transition-transform">
                    立即预约陪陪 <i class="fas fa-chevron-right ml-2"></i>
                </a>
            </div>
        </div>

        <!-- 装饰性漂浮元素 (不单调的核心) -->
        <!-- 只有一张图时，在图片周围放一些漂浮的图标，会让页面瞬间生动 -->
        <div class="absolute -top-10 -left-12 text-5xl text-pink opacity-20 animate-float-slow -z-10">
            <i class="fas fa-heart"></i>
        </div>
        <div class="absolute top-1/4 -right-16 text-6xl text-purple opacity-20 animate-float-fast -z-10">
            <i class="fas fa-star"></i>
        </div>
        <div class="absolute bottom-1/4 -left-20 text-7xl text-pink opacity-10 animate-float-slow -z-10">
            <i class="fas fa-ghost"></i>
        </div>
        <div class="absolute -bottom-10 -right-10 text-5xl text-yellow-400 opacity-20 animate-float-fast -z-10">
            <i class="fas fa-crown"></i>
        </div>
    </main>

    <!-- 底部固定的简易下单条（可选） -->
    <div class="fixed bottom-0 left-0 w-full p-4 z-40 md:hidden">
        <a href="index.html#order" class="flex items-center justify-center bg-white border-4 border-pixel p-4 rounded-2xl shadow-[4px_4px_0px_#2D3436] font-black text-pink">
            <i class="fas fa-comment-dots mr-2"></i> 咨询客服下单
        </a>
    </div>

    <!-- 进度条（告诉用户长图看到哪了） -->
    <div class="fixed top-0 left-0 w-full h-1 z-[60]">
        <div id="scrollProgress" class="h-full bg-pink w-0 transition-all duration-100"></div>
    </div>

    <script>
        // 顶部进度条逻辑
        window.onscroll = function() {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (winScroll / height) * 100;
            document.getElementById("scrollProgress").style.width = scrolled + "%";
        };
    </script>

</body>
</html>
